name: Build & Push to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: samuelstreets/connectwise-ticket-stats
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete old image tags from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE: samuelstreets/connectwise-ticket-stats
          KEEP: latest
          NEW_SHA_TAG: sha-${{ github.sha }}
        run: |
          # Get a Docker Hub JWT
          TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            | jq -r '.token')

          # Fetch all tags (up to 100)
          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/${IMAGE}/tags?page_size=100" \
            -H "Authorization: Bearer ${TOKEN}" \
            | jq -r '.results[].name')

          NEW_SHA_SHORT="${NEW_SHA_TAG:0:10}"

          for TAG in $TAGS; do
            # Keep 'latest' and the sha tag we just pushed
            if [[ "$TAG" == "$KEEP" || "$TAG" == "$NEW_SHA_SHORT"* ]]; then
              echo "Keeping tag: $TAG"
              continue
            fi
            echo "Deleting old tag: $TAG"
            curl -s -X DELETE "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/" \
              -H "Authorization: Bearer ${TOKEN}"
          done