services:
  cw-stats:
    image: samuelstreets/connectwise-ticket-stats:latest
    container_name: Connectwise-Ticket-Stats
    ports:
      - "5001:5000"

    environment:
      # ── ConnectWise API credentials ────────────────────────────────────────
      - CW_SITE=api-eu.myconnectwise.net
      - CW_COMPANY=yourcompanyid
      - CW_PUBLIC_KEY=your_public_key_here
      - CW_PRIVATE_KEY=your_private_key_here
      - CW_CLIENT_ID=your_client_id_here

      # ── SSL verification ───────────────────────────────────────────────────
      - CW_VERIFY_SSL=true

      # ── HTTPS proxy (optional) ─────────────────────────────────────────────
      # - HTTPS_PROXY=http://proxy.example.com:8080

      # ── Refresh interval (seconds) ─────────────────────────────────────────
      - CW_REFRESH_INTERVAL=300

      # ── How many days back to report on ────────────────────────────────────
      - CW_DAYS_BACK=7

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/config-check')"]
      interval: 30s
      timeout: 10s
      retries: 3
